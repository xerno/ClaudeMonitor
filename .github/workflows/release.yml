name: Release

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: macos-26
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v6

      - name: Select Xcode 26
        run: |
          sudo xcode-select -s "$(ls -d /Applications/Xcode_26*.app | head -1)"
          swift --version

      - name: Test
        run: ./test.sh

      - name: Build
        run: ./build.sh --release

      - name: Zip
        run: |
          cd .build
          zip -r ClaudeMonitor.zip ClaudeMonitor.app

      - name: Release (latest)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest build
          prerelease: true
          files: .build/ClaudeMonitor.zip
