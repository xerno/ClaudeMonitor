name: Release

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v6

      - name: Build
        run: |
          xcodebuild -project ClaudeMonitor.xcodeproj \
                     -scheme ClaudeMonitor \
                     -configuration Release \
                     -derivedDataPath build

      - name: Zip
        run: |
          cd build/Build/Products/Release
          zip -r ClaudeMonitor.zip ClaudeMonitor.app

      - name: Release (latest)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest build
          prerelease: true
          files: build/Build/Products/Release/ClaudeMonitor.zip
